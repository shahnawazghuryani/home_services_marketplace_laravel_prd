name: Deploy To cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular App
        working-directory: frontend
        run: npm run build

      - name: Prepare App Payload
        run: |
          mkdir -p deploy_app deploy_public
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.tools' \
            --exclude='frontend' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='deploy_bundle' \
            --exclude='.env' \
            --exclude='public/storage' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            ./ deploy_app/
          rsync -av ./public/ deploy_public/

      - name: Upload Laravel App
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./deploy_app/
          server-dir: gharkaam_app/
          dangerous-clean-slate: false

      - name: Upload Public Files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./deploy_public/
          server-dir: public_html/
          dangerous-clean-slate: false

      - name: Upload Temporary Deploy Runner
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          cat > deploy-runner.php <<'PHP'
          <?php
          $key = $_GET['key'] ?? '';
          $expected = '__DEPLOY_SECRET__';

          if (! is_string($key) || ! $expected || ! hash_equals($expected, $key)) {
              http_response_code(403);
              exit('Forbidden');
          }

          require __DIR__ . '/../gharkaam_app/vendor/autoload.php';

          $app = require __DIR__ . '/../gharkaam_app/bootstrap/app.php';
          $kernel = $app->make(Illuminate\Contracts\Console\Kernel::class);
          $kernel->bootstrap();

          $commands = [
              'migrate' => ['--force' => true],
              'storage:link' => [],
              'optimize:clear' => [],
          ];

          $result = [];
          foreach ($commands as $command => $options) {
              try {
                  Illuminate\Support\Facades\Artisan::call($command, $options);
                  $result[] = [
                      'command' => $command,
                      'status' => 'ok',
                      'output' => trim(Illuminate\Support\Facades\Artisan::output()),
                  ];
              } catch (Throwable $exception) {
                  $result[] = [
                      'command' => $command,
                      'status' => 'error',
                      'output' => $exception->getMessage(),
                  ];
              }
          }

          header('Content-Type: application/json');
          echo json_encode([
              'message' => 'Deploy runner executed.',
              'result' => $result,
          ]);
          PHP
          perl -0pi -e "s/__DEPLOY_SECRET__/${DEPLOY_WEBHOOK_SECRET}/g" deploy-runner.php
          curl --fail --show-error --silent \
            --user "${CPANEL_FTP_USERNAME}:${CPANEL_FTP_PASSWORD}" \
            -T deploy-runner.php \
            "ftp://${CPANEL_FTP_HOST}/public_html/deploy-runner.php"

      - name: Run Post-Deploy Commands
        env:
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          curl --fail --show-error --silent \
            "https://gharkaam.pk/deploy-runner.php?key=${DEPLOY_WEBHOOK_SECRET}"

      - name: Disable Temporary Deploy Runner
        if: always()
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          printf "%s" "<?php http_response_code(404); exit('Not Found');" > deploy-runner.php
          curl --fail --show-error --silent \
            --user "${CPANEL_FTP_USERNAME}:${CPANEL_FTP_PASSWORD}" \
            -T deploy-runner.php \
            "ftp://${CPANEL_FTP_HOST}/public_html/deploy-runner.php"
